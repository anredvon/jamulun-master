<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1220">

  <!-- SEO / OG (공유 미리보기용) -->
  <meta property="og:title" content="{% block og_title %}AI 재물운 센터{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}매번 달라지는 질문으로 오늘의 금전운, 소비습관, 미래자산을 알아보세요.{% endblock %}">
  <meta property="og:type" content="website">

  <title>{% block title %}AI 재물운 센터{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/jaemulun.css') }}">
</head>
<body>
  <div class="app-shell">

    <!-- 상단 네비게이션 바 -->
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">💸 재물운 센터</a>
      <nav class="topbar-nav">
        <a href="{{ url_for('index') }}">홈</a>
      </nav>
    </header>

    <!-- 플래시 메시지 (결제 성공/실패 등) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="flash-stack">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    <!-- 메인 콘텐츠 영역 -->
    <main class="page-wrap">
      {% block content %}{% endblock %}
    </main>

    <!-- 푸터 -->
    <footer class="app-footer">
      <p>© 2025 AI 재물운 센터 · 재미로 즐기는 테스트입니다</p>
    </footer>

  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
